name: Model Training and Deployment Pipeline

on:
  push:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install mlflow dvc

      - name: Pull Data (Mock DVC)
        run: |
          echo "Simulating dvc pull..."
          # dvc pull -r origin (In real scenario)

      - name: Train Model and Log to MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
         
          python train.py
          echo "RUN_12345" > model_info.txt 

      - name: Persist Model Info
        uses: actions/upload-artifact@v4
        with:
          name: model-metadata
          path: model_info.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Model Info
        uses: actions/download-artifact@v4
        with:
          name: model-metadata

      - name: Check Accuracy Threshold
        run: |
          
          python check_threshold.py

      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
